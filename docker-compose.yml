version: '3.9'

services:
  web:
    build: .
    container_name: gtr_app
    ports:
      - "5000:5000"
    depends_on:
      - db
    environment:
      MYSQL_HOST: db
      MYSQL_USER: gtr_user
      MYSQL_PASSWORD: gtr_pass
      MYSQL_DB: gtr
      SECRET_KEY: gtr
    volumes:
      - ./uploads:/app/uploads

  db:
    image: mariadb:10.11
    container_name: gtr_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: gtr
      MYSQL_USER: gtr_user
      MYSQL_PASSWORD: gtr_pass
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql
volumes:
  db_data:
